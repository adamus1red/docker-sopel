# This is a basic workflow to help you get started with Actions

name: Docker

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  # schedule:
  #   - cron: '0 10 * * *' # everyday at 10am
  push:
    branches:
      - 'master'
    tags:
      - '*.*.*'
  pull_request:
  workflow_dispatch:
    inputs:
      sopel_version:
        description: 'Sopel version'     
        required: true
        default: 'master' 

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    env:
      SOPEL_BRANCH: master
      PYTHON_DEFAULT: 3
      BUILD_DATE: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
      PLATFORMS: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64

    strategy:
      matrix:
        python: [3.6, 3.7, 3.8, 3.9, 3]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Prepare Tags
        id: prep
        run: |
          DOCKER_IMAGE=${{ secrets.DOCKERHUB_REPOSITORY }}
          VERSION=noop
          if [ "${{ github.event_name }}" = "schedule" ]; then
            VERSION=nightly-py${{ matrix.python }}
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ $GITHUB_REF == refs/heads/* ]]; then
            VERSION=$(echo ${GITHUB_REF#refs/heads/} | sed -r 's#/+#-#g')
            if [ "${{ github.event.repository.default_branch }}" = "$VERSION" ]; then
              VERSION=edge-py${{ matrix.python }}
            fi
          elif [[ $GITHUB_REF == refs/pull/* ]]; then
            VERSION=pr-${{ github.event.number }}
          fi
          TAGS="${DOCKER_IMAGE}:${VERSION}-py${{ matrix.python }}"
          if [[ "${{ github.event.inputs.sopel_version }}" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            MINOR=${VERSION%.*}
            MAJOR=${MINOR%.*}
            TAGS="$TAGS,${DOCKER_IMAGE}:${MINOR}-py${{ matrix.python }},${DOCKER_IMAGE}:${MAJOR}-py${{ matrix.python }},${DOCKER_IMAGE}:py${{ matrix.python }}"
            if [[ ${{ matrix.python }} == ${PYTHON_DEFAULT} ]]; then
              # Handle people who don't care about a specific version of python.
              TAGS="$TAGS,${DOCKER_IMAGE}:${VERSION},${DOCKER_IMAGE}:${MINOR},${DOCKER_IMAGE}:${MAJOR},${DOCKER_IMAGE}:latest"
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAGS="$TAGS,${DOCKER_IMAGE}:sha-${GITHUB_SHA::8}"
          fi
          echo ::set-output name=version::${VERSION}
          echo ::set-output name=tags::${TAGS}
          echo ::set-output name=created::$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo ${TAGS}
      -
        name: Login to DockerHub
        uses: docker/login-action@v1 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          platforms: "${{ github.env.PLATFORMS }}"
          push: true
          build-args: |
            SOPEL_BRANCH=$(git describe --tags --abbrev=0)
            VCS_REF=$(echo ${GITHUB_REF#refs/heads/} | sed -r 's#/+#-#g')
            PYTHON_TAG=${{ matrix.python }}-alpine
            BUILD_DATE="${{ github.env.BUILD_DATE }}"
          tags: ${{ steps.prep.outputs.tags }}